name: mobile_app
description: "AI Assistant with Camera and Voice"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Networking
  http: ^1.2.0
  
  # State management
  provider: ^6.1.2
  
  # Voice input
  speech_to_text: ^7.0.0
  
  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Camera & Image
  camera: ^0.11.0
  image_picker: ^1.1.0
  
  # File handling
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/avatar.gif